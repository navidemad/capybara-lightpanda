name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: rubygems
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: ruby

      - name: Verify tag matches gem version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          gem_version="$(ruby -Ilib -rcapybara/lightpanda/version -e 'print Capybara::Lightpanda::VERSION')"
          if [ "$tag" != "$gem_version" ]; then
            echo "::error::Tag v$tag does not match VERSION $gem_version in lib/capybara/lightpanda/version.rb"
            exit 1
          fi

      - name: Verify CHANGELOG has an entry for this version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          if ! grep -qE "^## \[?${tag}\]?" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${tag}]' or '## ${tag}' heading"
            exit 1
          fi

      - run: bundle exec rubocop
      - run: bundle exec rake spec:unit

      - uses: rubygems/release-gem@v1

      - name: Extract CHANGELOG section for this version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          awk -v v="$tag" '
            $0 ~ "^## \\[?" v "\\]?" { found=1; next }
            found && /^## \[?[0-9]/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          echo "----- release_notes.md -----"
          cat release_notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: true
